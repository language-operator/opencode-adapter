apiVersion: langop.io/v1alpha1
kind: LanguageAgentRuntime
metadata:
  name: opencode
  labels:
    {{- include "opencode.labels" . | nindent 4 }}
spec:
  # Single combined image used by both the init container (seed-config.mjs)
  # and the main container (server.mjs — xterm.js / tmux WebSocket terminal
  # fronting the opencode TUI).
  image: {{ .Values.image.repository }}:{{ .Values.image.tag }}

  # Authentication is handled entirely by the cluster OIDC proxy — this is the
  # sole auth gate. When the cluster enables auth, agents using this runtime sit
  # behind the injected oauth2-proxy sidecar. opencode talks to the model gateway
  # using the provider config in opencode.jsonc; no interactive login is needed.
  auth:
    enabled: {{ .Values.auth.enabled }}

  ports:
    - name: http
      port: {{ .Values.port }}
      protocol: TCP
      expose: true

  workspace:
    size: {{ .Values.workspace.size }}
    mountPath: {{ .Values.workspace.mountPath }}

  deployment:
    {{- if .Values.image.pullPolicy }}
    imagePullPolicy: {{ .Values.image.pullPolicy }}
    {{- end }}
    # The main container runs the image's default entrypoint (server.mjs). On
    # WebSocket connect it spawns `tmux new-session -A` running launch-opencode,
    # which opens the opencode TUI bound to AGENT_REPO_DIR (when the agent sets
    # spec.repository) or /workspace otherwise. The agent's instructions,
    # model, provider, and MCP servers all come from the opencode.jsonc that the
    # init container writes to the shared /etc/opencode volume.
    initContainers:
      - name: opencode-adapter
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        {{- if .Values.image.pullPolicy }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- end }}
        # Override the image's default entrypoint (which runs the server) so this
        # init container runs seed-config.mjs once and exits. MODEL_ENDPOINT,
        # LLM_MODEL, AGENT_NAME, and AGENT_INSTRUCTIONS are injected by the operator.
        command: ["node", "/app/seed-config.mjs"]
        volumeMounts:
          - name: opencode-config
            mountPath: /etc/opencode

    startupProbe:
      tcpSocket:
        port: {{ .Values.port }}
      initialDelaySeconds: 5
      periodSeconds: 2
      timeoutSeconds: 2
      failureThreshold: 30

    livenessProbe:
      tcpSocket:
        port: {{ .Values.port }}
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 3

    readinessProbe:
      tcpSocket:
        port: {{ .Values.port }}
      periodSeconds: 10
      timeoutSeconds: 3
      successThreshold: 1
      failureThreshold: 3

    env:
      # The image sets WorkingDir=/ with no HOME; redirect all writable paths to /workspace
      - name: HOME
        value: /workspace
      # SQLite session DB and other opencode state lives under $XDG_DATA_HOME/opencode
      - name: XDG_DATA_HOME
        value: /workspace/.local/share
      # opencode writes a runtime cache here; root fs is read-only so redirect to workspace
      - name: XDG_CACHE_HOME
        value: /workspace/.cache
      # Tell opencode where to find the config written by the init container
      - name: OPENCODE_CONFIG_DIR
        value: /etc/opencode

    volumes:
      - name: opencode-config
        emptyDir: {}

    volumeMounts:
      - name: opencode-config
        mountPath: /etc/opencode

    resources:
      {{- toYaml .Values.resources | nindent 6 }}
