apiVersion: langop.io/v1alpha1
kind: LanguageAgentRuntime
metadata:
  name: opencode
  labels:
    {{- include "opencode.labels" . | nindent 4 }}
spec:
  image: {{ .Values.image.repository }}:{{ .Values.image.tag }}

  # Auto-generate the HTTP Basic Auth password per agent and inject it as
  # OPENCODE_SERVER_PASSWORD. The username is a static env var (see deployment.env).
  credentials:
    - name: OPENCODE_SERVER_PASSWORD

  # Agents using this runtime sit behind the cluster OIDC proxy (when the cluster enables auth).
  auth:
    enabled: {{ .Values.auth.enabled }}

  ports:
    - name: http
      port: {{ .Values.port }}
      protocol: TCP
      expose: true

  workspace:
    size: {{ .Values.workspace.size }}
    mountPath: {{ .Values.workspace.mountPath }}

  deployment:
    # Pre-seed /workspace as the default project so the picker is bypassed on first launch.
    # opencode db creates and migrates the DB if it doesn't exist yet (fresh PVC).
    # INSERT OR IGNORE is idempotent — safe to run on every pod start.
    command: ["/bin/sh", "-c"]
    args: ["opencode db \"INSERT OR IGNORE INTO project (id, worktree, vcs, time_created, time_updated, sandboxes) VALUES ('workspace', '/workspace', null, (strftime('%s','now')*1000), (strftime('%s','now')*1000), '[]')\" 2>/dev/null || true; exec opencode web --hostname 0.0.0.0 --port {{ .Values.port }}"]

    initContainers:
      - name: opencode-adapter
        image: {{ .Values.adapter.image.repository }}:{{ .Values.adapter.image.tag }}
        {{- if .Values.adapter.image.pullPolicy }}
        imagePullPolicy: {{ .Values.adapter.image.pullPolicy }}
        {{- end }}
        # MODEL_ENDPOINT and LLM_MODEL are injected by the operator.
        # The adapter writes /etc/opencode/opencode.jsonc with provider + MCP config.
        volumeMounts:
          - name: opencode-config
            mountPath: /etc/opencode

    livenessProbe:
      tcpSocket:
        port: {{ .Values.port }}
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 3

    readinessProbe:
      tcpSocket:
        port: {{ .Values.port }}
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      successThreshold: 1
      failureThreshold: 3

    env:
      # HTTP Basic Auth username (the password is auto-generated; see spec.credentials)
      - name: OPENCODE_SERVER_USERNAME
        value: opencode
      # The image sets WorkingDir=/ with no HOME; redirect all writable paths to /workspace
      - name: HOME
        value: /workspace
      # SQLite session DB and other opencode state lives under $XDG_DATA_HOME/opencode
      - name: XDG_DATA_HOME
        value: /workspace/.local/share
      # Bun writes a runtime cache here; root fs is read-only so redirect to workspace
      - name: XDG_CACHE_HOME
        value: /workspace/.cache
      # Tell opencode where to find the config written by the init container
      - name: OPENCODE_CONFIG_DIR
        value: /etc/opencode

    volumes:
      - name: opencode-config
        emptyDir: {}

    volumeMounts:
      - name: opencode-config
        mountPath: /etc/opencode

    resources:
      {{- toYaml .Values.resources | nindent 6 }}
