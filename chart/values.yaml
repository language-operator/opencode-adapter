# opencode LanguageAgentRuntime — a cluster-scoped runtime preset.
# Requires the language-operator chart (which provides the LanguageAgentRuntime
# CRD) to be installed first.

# Combined runtime image built by this repo. Used by both the init container
# (seed-config.mjs — translates the operator's /etc/agent/config.yaml into
# opencode's native config) and the main container (server.mjs — the xterm.js /
# tmux WebSocket terminal that fronts the interactive opencode TUI).
image:
  repository: ghcr.io/language-operator/opencode-adapter
  tag: 0.1.2
  pullPolicy: ""

# Agents using this runtime sit behind the cluster OIDC proxy (when the cluster
# enables auth).
auth:
  enabled: true

# HTTP port the WebSocket terminal server listens on.
port: 8080

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 2Gi
    cpu: 1000m
