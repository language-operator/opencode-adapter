<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__AGENT_NAME__</title>
  <link rel="stylesheet" href="/xterm.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    #terminal { width: 100vw; height: 100vh; padding: 4px; box-sizing: border-box; }
    .xterm-viewport { background: #000 !important; }

    /* Hide xterm's scrollbar but keep wheel/keyboard scroll. */
    .xterm-viewport::-webkit-scrollbar { display: none; }
    .xterm-viewport { scrollbar-width: none; -ms-overflow-style: none; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="/xterm.js"></script>
  <script src="/addon-fit.js"></script>
  <script src="/addon-clipboard.js"></script>
  <script>
    const isMac = /Mac|iPod|iPhone|iPad/.test(navigator.platform);

    const term = new Terminal({
      cursorBlink: true,
      fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace',
      fontSize: 14,
      scrollback: 5000,
      theme: {
        background: '#000000',
        foreground: '#ffffff',
        selectionBackground: '#4d4d4d',
        selectionForeground: '#ffffff',
        selectionInactiveBackground: '#2d2d2d',
      },
    });

    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    // OSC 52: lets in-terminal programs (opencode, vim, fzf, ...) push text to the
    // system clipboard via escape sequences. Reads navigator.clipboard.{readText,writeText}.
    term.loadAddon(new ClipboardAddon.ClipboardAddon());

    // User-driven copy/paste keybindings.
    //
    // Copy:
    //  - Ctrl+C with a non-empty selection (smart copy, VS-Code style). No
    //    selection -> falls through to opencode as SIGINT.
    //  - Ctrl+Insert (universal X11 convention; never conflicts with browser).
    //  - Cmd+C on Mac with selection.
    //
    // Paste:
    //  - Ctrl+Shift+V (works in Chrome/Firefox; not a reserved shortcut).
    //  - Shift+Insert (universal X11 convention).
    //  - Cmd+V on Mac.
    //
    // Ctrl+Shift+C is intentionally NOT bound — Chrome and Firefox reserve it
    // for DevTools "inspect element" and intercept it before page handlers.
    term.attachCustomKeyEventHandler((e) => {
      if (e.type !== 'keydown') return true;

      // --- copy ---
      const ctrlCopy   = e.code === 'KeyC'   && e.ctrlKey && !e.shiftKey && !e.metaKey && !e.altKey;
      const insertCopy = e.code === 'Insert' && e.ctrlKey && !e.shiftKey && !e.metaKey && !e.altKey;
      const macCopy    = isMac && e.code === 'KeyC' && e.metaKey && !e.ctrlKey && !e.shiftKey && !e.altKey;
      if (ctrlCopy || insertCopy || macCopy) {
        const sel = term.getSelection();
        if (sel) {
          navigator.clipboard.writeText(sel).catch((err) => {
            console.warn('clipboard write failed:', err);
          });
          term.clearSelection();
          return false;
        }
        // No selection: Ctrl+C falls through to opencode as SIGINT; Ctrl+Insert
        // and Cmd+C are no-ops (let xterm handle them, which is also a no-op).
      }

      // --- paste ---
      const ctrlShiftPaste = e.code === 'KeyV'   && e.ctrlKey && e.shiftKey && !e.metaKey && !e.altKey;
      const insertPaste    = e.code === 'Insert' && e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey;
      const macPaste       = isMac && e.code === 'KeyV' && e.metaKey && !e.ctrlKey && !e.shiftKey && !e.altKey;
      if (ctrlShiftPaste || insertPaste || macPaste) {
        navigator.clipboard.readText().then((text) => {
          if (text) term.paste(text);
        }).catch((err) => {
          console.warn('clipboard read failed:', err);
        });
        return false;
      }

      return true;
    });

    term.open(document.getElementById('terminal'));
    fit.fit();

    // Window title: '<agent>' idle, '✦ <agent>' when opencode wants user input.
    // A TUI rings BEL when it finishes responding and is ready for input, so
    // bell == waiting-on-user. Any keypress flips back to idle since the user is
    // now driving opencode again. (Best-effort: harmless if opencode never rings.)
    const AGENT_NAME = '__AGENT_NAME__';
    const GLYPH_WAITING = '✦';
    let waiting = false;
    function renderTitle() {
      document.title = waiting ? `${GLYPH_WAITING} ${AGENT_NAME}` : AGENT_NAME;
    }
    renderTitle();
    term.onBell(() => { waiting = true; renderTitle(); });

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.binaryType = 'arraybuffer';

    function sendResize() {
      fit.fit();
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    }

    ws.onopen = sendResize;
    ws.onmessage = (ev) => {
      if (typeof ev.data === 'string') {
        term.write(ev.data);
      } else {
        term.write(new Uint8Array(ev.data));
      }
    };
    ws.onclose = () => {
      term.write('\r\n\x1b[31m[connection closed]\x1b[0m\r\n');
    };

    term.onData((data) => {
      if (waiting) { waiting = false; renderTitle(); }
      if (ws.readyState === WebSocket.OPEN) ws.send(data);
    });

    window.addEventListener('resize', sendResize);
  </script>
</body>
</html>
